name: Build S3C Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap SDK paths
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF

      - name: Generate Signing Keystore
        run: |
          cd android
          keytool -genkey -v \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass s3cpassword \
            -keypass s3cpassword \
            -dname "CN=S3C, OU=App, O=SMAN2Wates, L=Wates, S=DIY, C=ID"

      - name: Initialize Bubblewrap Project
        run: |
          cd android
          bubblewrap init --manifest=https://s3c-service-3bbvxxtsja-et.a.run.app/manifest.json \
            --directory=. \
            --packageId=com.s3c.smartcanteen || true

      - name: Build APK
        run: |
          cd android
          bubblewrap build
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: s3cpassword
          BUBBLEWRAP_KEY_PASSWORD: s3cpassword

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: S3C-Release-APK
          path: |
            android/app-release-signed.apk
            android/app-release.apk
            android/**/*.apk
          if-no-files-found: warn
