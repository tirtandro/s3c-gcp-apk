name: Build S3C Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download and Resize App Icons
        run: |
          sudo apt-get install -y imagemagick --quiet
          curl -L -o /tmp/logo.png "https://s3c-service-3bbvxxtsja-et.a.run.app/static/img/logo_sekolah.png"

          declare -A dpi_sizes=( ["ldpi"]=36 ["mdpi"]=48 ["hdpi"]=72 ["xhdpi"]=96 ["xxhdpi"]=144 ["xxxhdpi"]=192 )
          for dpi in "${!dpi_sizes[@]}"; do
            size=${dpi_sizes[$dpi]}
            mkdir -p android/app/src/main/res/mipmap-$dpi
            convert /tmp/logo.png -resize ${size}x${size} android/app/src/main/res/mipmap-$dpi/ic_launcher.png
          done
          echo "Icons generated successfully"

      - name: Generate Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version=8.5

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: S3C-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
