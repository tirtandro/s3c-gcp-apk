<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - S3C</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Fraunces:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f4f1; min-height: 100vh; }
        .auth-header { background: linear-gradient(135deg, #1a5c38, #2d8653); padding: 32px 24px 50px; text-align: center; color: white; position: relative; }
        .auth-header::after { content: ''; position: absolute; bottom: -25px; left: 0; right: 0; height: 50px; background: #f0f4f1; border-radius: 40px 40px 0 0; }
        .auth-title { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .auth-body { padding: 12px 24px 40px; }
        .auth-card { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 4px 20px rgba(26,92,56,0.1); }
        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 5px; }
        .form-control { width: 100%; padding: 12px 16px; border-radius: 12px; border: 2px solid #e8ede9; background: white; font-family: inherit; font-size: 14px; color: #1e2a1f; transition: all 0.2s; }
        .form-control:focus { outline: none; border-color: #2d8653; box-shadow: 0 0 0 3px rgba(45,134,83,0.1); }
        select.form-control { appearance: none; }
        .role-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
        .role-option { display: none; }
        .role-label {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            padding: 12px 8px; border-radius: 12px; border: 2px solid #e8ede9;
            cursor: pointer; transition: all 0.2s; text-align: center;
        }
        .role-label .role-em { font-size: 24px; }
        .role-label .role-tx { font-size: 11px; font-weight: 600; color: #555; }
        .role-option:checked + .role-label { border-color: #2d8653; background: #e8f5ee; }
        .btn-register { width: 100%; padding: 14px; background: linear-gradient(135deg, #1a5c38, #2d8653); color: white; border: none; border-radius: 14px; font-family: inherit; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; box-shadow: 0 4px 15px rgba(26,92,56,0.3); }
        .btn-register:hover { transform: translateY(-1px); }
        .auth-footer { text-align: center; margin-top: 16px; font-size: 13px; color: #888; }
        .auth-footer a { color: #2d8653; font-weight: 700; text-decoration: none; }
        .conditional-field { display: none; }
        .flash { padding: 12px 16px; border-radius: 12px; font-size: 13px; margin-bottom: 16px; display: flex; gap: 8px; align-items: center; }
        .flash-danger { background: #fff0f0; color: #e05252; border: 1px solid #ffcccc; }
        @media (min-width: 640px) { body { max-width: 640px; margin: 0 auto; } }
    </style>
</head>
<body>
    <div class="auth-header">
        <a href="{{ url_for('index') }}" title="Kembali ke Beranda"><img src="{{ url_for('static', filename='img/logo_sekolah.png') }}" style="width:64px;height:64px;object-fit:contain;margin-bottom:10px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.25));cursor:pointer;" alt="Logo"></a>
        <div style="font-size:11px;opacity:0.8;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;">SMA Negeri 2 Wates</div>
        <div class="auth-title">Buat Akun S3C</div>
        <div style="font-size:13px;opacity:0.8;">Bergabung dengan kantin sekolah yang lebih cerdas</div>
    </div>
    <div class="auth-body">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}
            <div class="flash flash-{{ cat }}"><i class="fas fa-exclamation-circle"></i> {{ msg }}</div>
            {% endfor %}
        {% endwith %}
        <div class="auth-card">
            <form method="POST" id="registerForm">
                <div class="form-group">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text" name="name" class="form-control" placeholder="Nama lengkap kamu" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Buat username unik" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Min. 6 karakter" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Daftar sebagai</label>
                    <div class="role-grid">
                        <div>
                            <input type="radio" name="role" value="student" id="role_student" class="role-option" checked onchange="showFields('student')">
                            <label for="role_student" class="role-label">
                                <span class="role-em">🎓</span><span class="role-tx">Murid</span>
                            </label>
                        </div>
                        <div>
                            <input type="radio" name="role" value="tenant" id="role_tenant" class="role-option" onchange="showFields('tenant')">
                            <label for="role_tenant" class="role-label">
                                <span class="role-em">🍽️</span><span class="role-tx">Tenant</span>
                            </label>
                        </div>
                        <div>
                            <input type="radio" name="role" value="admin" id="role_admin" class="role-option" onchange="showFields('admin')">
                            <label for="role_admin" class="role-label">
                                <span class="role-em">⚙️</span><span class="role-tx">Admin</span>
                            </label>
                        </div>
                    </div>
                </div>
                <div id="kelas_field" class="form-group">
                    <label class="form-label">Kelas</label>
                    <select name="kelas" class="form-control">
                        <option value="">Pilih kelas</option>
                        {% for k in ['X A','X B','X C','X D','X E','XI A','XI B','XI C','XI D','XI E','XII A','XII B','XII C','XII D','XII E'] %}
                        <option>{{ k }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div id="tenant_name_field" class="form-group conditional-field">
                    <label class="form-label">Nama Warung / Stand</label>
                    <input type="text" name="tenant_name" class="form-control" placeholder="Nama warung/stand kamu">
                </div>
                <button type="submit" class="btn-register">🌿 Daftar Sekarang</button>
            </form>
        </div>
        <div class="auth-footer">Sudah punya akun? <a href="{{ url_for('login') }}">Login di sini</a></div>
    </div>
    <script>
        function showFields(role) {
            document.getElementById('kelas_field').style.display = role === 'student' ? 'block' : 'none';
            document.getElementById('tenant_name_field').style.display = role === 'tenant' ? 'block' : 'none';
        }
        showFields('student');
    </script>
</body>
</html>
